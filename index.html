<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physics Problems</title>
</head>
<body>
  <div>
    <h1>Physics Problems</h1>
    <p>Welcome to the Physics Problems web page.</p>
  </div>
  <script async type="module">
    import './polyfill.js';
    import { instantiate } from './script/instantiate.js';
    import { defaultBrowserSetup, createDefaultWorkerFactory } from './script/platforms/browser.js';

    const preludeScriptUrl = new URL('./polyfill.js', window.location.href).href;
    const module = fetch(new URL('./script/PhysicsProblems.wasm', window.location.href));

    const instantiateOptions = await defaultBrowserSetup({
        module,
        spawnWorker: createDefaultWorkerFactory(preludeScriptUrl)
    });
    await instantiate(instantiateOptions);

    // import { init } from './script/index.js';
    // await init();
  </script>
</body>
</html>
