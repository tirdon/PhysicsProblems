<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Physics Problems</title>
  <meta name="description" content="Interactive physics simulations — pendulum, forces, and more.">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <main>
    <h1>Physics Problems</h1>
    <p>Simple Pendulum — compute period T = 2π√(L / g)</p>
    <div class="canvas-container">
      <canvas id="main-canvas" width="400" height="400"></canvas>
    </div>
  </main>

  <!-- Load WebGPU renderer and Timeline controller, expose on global scope for Swift WASM -->
  <script type="module">
    import { WebGPURenderer } from './renderer.js';
    import './timeline.js';
    // Make it available globally so Swift can access it via JSObject.global
    window.WebGPURenderer = WebGPURenderer;
  </script>

  <script async type="module">
    import './polyfill.js';
    import { init } from './script/index.js';

    await init({
      getImports() {
        return {};
      }
    });
  </script>
</body>
</html>
